<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="#FDF8F3"/>

  <!-- Decorative wave at bottom -->
  <path d="M0,500 Q300,450 600,480 T1200,460 L1200,630 L0,630 Z" fill="#14B8A6" opacity="0.15"/>
  <path d="M0,520 Q300,480 600,510 T1200,490 L1200,630 L0,630 Z" fill="#14B8A6" opacity="0.25"/>
  <path d="M0,550 Q300,520 600,540 T1200,530 L1200,630 L0,630 Z" fill="#14B8A6" opacity="0.4"/>

  <!-- Sun decoration -->
  <circle cx="1050" cy="120" r="80" fill="#FFD700" opacity="0.3"/>
  <circle cx="1050" cy="120" r="50" fill="#FFD700" opacity="0.5"/>

  <!-- Palm tree silhouette -->
  <g opacity="0.1" transform="translate(100, 350)">
    <path d="M30,150 Q35,100 40,50 Q42,25 35,10" stroke="#2D5A45" stroke-width="8" fill="none" stroke-linecap="round"/>
    <ellipse cx="10" cy="15" rx="25" ry="8" fill="#2D5A45" transform="rotate(-30, 35, 10)"/>
    <ellipse cx="60" cy="15" rx="25" ry="8" fill="#2D5A45" transform="rotate(30, 35, 10)"/>
    <ellipse cx="35" cy="5" rx="20" ry="7" fill="#2D5A45"/>
  </g>

  <!-- Main text: Figuring Out. -->
  <text x="100" y="280" font-family="Space Grotesk, system-ui, sans-serif" font-size="96" font-weight="700" fill="#1A1A1A">Figuring Out</text>
  <circle cx="720" cy="255" r="16" fill="#14B8A6"/>

  <!-- Tagline -->
  <text x="100" y="360" font-family="Space Grotesk, system-ui, sans-serif" font-size="32" font-weight="400" fill="#6B7280">In a world where everyone is figuring out,</text>
  <text x="100" y="405" font-family="Space Grotesk, system-ui, sans-serif" font-size="32" font-weight="600" fill="#14B8A6">at least we figured out the hydration.</text>

  <!-- Bottom text -->
  <text x="100" y="580" font-family="Space Grotesk, system-ui, sans-serif" font-size="24" font-weight="500" fill="#1A1A1A">Premium Electrolytes for Runners in India</text>

